name: Build and Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        default: v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk BatteryPackOptimizer-${{github.event.inputs.version}}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{github.event.inputs.version}}
          name: Release ${{github.event.inputs.version}}
          body: |
            ## BatteryPackOptimizer ${{github.event.inputs.version}}
            Download APK and install on Android device.
            - Full physical process modeling
            - 2D/3D dual-view visualization
            - Optimization simulation and logging
          files: BatteryPackOptimizer-${{github.event.inputs.version}}.apk
          generate_release_notes: true
