name: Self-Play Training

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node scripts/train.cjs

      - name: Commit skills
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/skills.json public/data/skills.json
          git diff --cached --quiet || git commit -m "chore: update skills"
          git push
